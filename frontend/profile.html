<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>HostHaven | Profile</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet" href="css/dashboard.css">

</head>

<body>

<header class="header">

<div class="logo">

<h2>HostHaven</h2>

</div>

<nav>

<a href="dashboard.html">Home</a>

<a href="bookings.html">Bookings</a>

<a href="#" onclick="logout()">Logout</a>

</nav>

</header>

<section class="dashboard">

<h1>My Profile</h1>

<form id="profileForm">

<div class="form-group">

<label>Full Name</label>

<input
type="text"
id="fullName">

</div>

<div class="form-group">

<label>Username</label>

<input
type="text"
id="username"
readonly>

</div>

<div class="form-group">

<label>Email</label>

<input
type="email"
id="email">

</div>

<div class="form-group">

<label>Phone</label>

<input
type="text"
id="phone">

</div>

<div class="form-group">

<label>Role</label>

<input
type="text"
id="role"
readonly>

</div>

<button
type="submit"
id="updateProfileBtn">

Update Profile

</button>

</form>

</section>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<script src="js/api.js"></script>

<script src="js/profile.js"></script>

</body>

</html>
