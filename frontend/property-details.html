<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>HostHaven | Property Details</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="css/property.css">

</head>

<body>

<header class="header">

    <div class="logo">

        <h2>HostHaven</h2>

    </div>

    <nav>

        <a href="dashboard.html">Home</a>

        <a href="bookings.html">Bookings</a>

        <a href="profile.html">Profile</a>

        <a href="#" onclick="logout()">Logout</a>

    </nav>

</header>

<section class="property-details">

    <div class="details-card">

        <h1 id="title">Property Title</h1>

        <h3 id="address"></h3>

        <p id="description"></p>

        <h2 id="price"></h2>

        <p>

            <strong>Benefits :</strong>

            <span id="benefits"></span>

        </p>

    </div>

</section>
<div class="form-group">

    <label>Guest ID</label>

    <input
        type="number"
        id="guestId"
        placeholder="Enter Your Guest ID">

    <button
        type="button"
        onclick="saveGuestId()">

        Save Guest ID

    </button>

</div>

<section class="booking-section">

    <div class="booking-card">

        <h2>Book This Property</h2>

        <form id="bookingForm">

            <label>

                Check In

            </label>

            <input
                type="date"
                id="checkInDate"
                required>

            <label>

                Check Out

            </label>

            <input
                type="date"
                id="checkOutDate"
                required>

            <button type="submit">

                Book Now

            </button>

        </form>

    </div>

</section>

<footer>

    <p>

        © 2026 HostHaven Property Rental Management System

    </p>

</footer>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<script src="js/api.js"></script>

<script src="js/property.js"></script>

<script>

checkLogin();

</script>

</body>

</html>
